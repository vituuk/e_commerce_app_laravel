services:
  - type: web
    name: e-commerce-api
    runtime: docker
    region: singapore
    plan: free
    envVars:
      - key: APP_NAME
        value: Laravel
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true  # Render auto-generates this
      - key: APP_URL
        value: https://e-commerce-api.onrender.com  # Will be updated after deploy
      - key: CLOUDINARY_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

      # Database — set these manually in Render Dashboard from your Postgres service page
      # Use the EXTERNAL hostname (not the internal short name)
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        sync: false   # Set to: dpg-d8h3eid8nd3s73bpnbsg-a.singapore-postgres.render.com
      - key: DB_PORT
        value: "5432"
      - key: DB_DATABASE
        sync: false   # Set to: e_commerce_mobile_v1
      - key: DB_USERNAME
        sync: false   # Set to: e_commerce_mobile_v1_user
      - key: DB_PASSWORD
        sync: false   # Set from your Render Postgres dashboard
      - key: DB_SSLMODE
        value: require

      # Session & Cache
      - key: SESSION_DRIVER
        value: cookie
      - key: CACHE_STORE
        value: file
      - key: QUEUE_CONNECTION
        value: database

      # Logging
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: error


