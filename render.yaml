services:
  - type: web
    name: e-commerce-api
    runtime: docker
    region: singapore
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      # ── App ──────────────────────────────────────────────────────────────
      - key: APP_NAME
        value: Laravel
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        sync: false         # ← Paste your base64:... key from .env here in the Render dashboard
      - key: APP_URL
        value: https://e-commerce-app-laravel-2.onrender.com

      # ── Database (PostgreSQL on Render) ──────────────────────────────────
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        sync: false         # ← dpg-d8h3eid8nd3s73bpnbsg-a.singapore-postgres.render.com
      - key: DB_PORT
        value: "5432"
      - key: DB_DATABASE
        sync: false         # ← e_commerce_mobile_v1
      - key: DB_USERNAME
        sync: false         # ← e_commerce_mobile_v1_user
      - key: DB_PASSWORD
        sync: false         # ← your Render Postgres password
      - key: DB_SSLMODE
        value: require

      # ── Cloudinary ───────────────────────────────────────────────────────
      - key: CLOUDINARY_CLOUD_NAME
        sync: false         # ← dkjdboxve
      - key: CLOUDINARY_API_KEY
        sync: false         # ← 986233195126455
      - key: CLOUDINARY_API_SECRET
        sync: false         # ← your Cloudinary API secret

      # ── Session / Cache / Queue ───────────────────────────────────────────
      - key: SESSION_DRIVER
        value: cookie
      - key: CACHE_STORE
        value: file
      - key: QUEUE_CONNECTION
        value: database
      - key: FILESYSTEM_DISK
        value: local

      # ── Logging ───────────────────────────────────────────────────────────
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: error
